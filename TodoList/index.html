<!DOCTYPE html>
<html>
  <head>
    <title>Todo List</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <h2 id="clock">00:00:00</h2>
    <form id="formName">
      <input
        id="formText"
        type="text"
        placeholder="What is your name?"
        required
      />

      <input id="formBtn" type="submit" value="Log in" />
    </form>
    <h1 id="greeting" class="hidden"></h1>
    <form id="formTodo">
      <input type="text" placeholder="Write To Do and Press Enter" required />
    </form>
    <ul id="todoList"></ul>
    <div id="weather">
      <span></span>
      <span></span>
    </div>

    <script src="src/clock.js"></script>
    <script src="src/greeting.js"></script>
    <script src="src/background.js"></script>
    <script src="src/todo.js"></script>
    <script src="src/weather.js"></script>
  </body>
</html>
